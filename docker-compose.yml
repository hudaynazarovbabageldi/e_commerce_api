version: '3.8'

services:
    app:
        build: .
        ports:
            - '3000:3000'
        environment:
            - NODE_ENV=production
            - DB_HOST=postgres
            - REDIS_HOST=redis
        depends_on:
            - postgres
            - redis
        volumes:
            - ./src:/app/src

    postgres:
        image: postgres:15-alpine
        environment:
            POSTGRES_USER: ecommerce
            POSTGRES_PASSWORD: password
            POSTGRES_DB: ecommerce_db
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7-alpine
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data

volumes:
    postgres_data:
    redis_data:
